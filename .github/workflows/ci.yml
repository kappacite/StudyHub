name: CI

# Gate anti-régression. Tous les jobs doivent passer avant qu'une PR puisse
# être fusionnée dans `main` (voir la protection de branche du dépôt).
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend · tests & coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage gate
        env:
          FLASK_ENV: testing
        # Les tests utilisent SQLite en mémoire (cf. tests/conftest.py).
        # Le build échoue si la couverture passe sous le plancher.
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80

  migrations:
    name: Backend · migrations (PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studyhub
          POSTGRES_USER: studyhub
          POSTGRES_PASSWORD: studyhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U studyhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply all migrations on a fresh PostgreSQL database
        env:
          FLASK_APP: app
          FLASK_ENV: development
          DATABASE_URL: postgresql://studyhub:studyhub@localhost:5432/studyhub
          SECRET_KEY: ci_secret_key_not_used_in_prod
          JWT_SECRET_KEY: ci_jwt_secret_not_used_in_prod
        run: flask db upgrade

  frontend-build:
    name: Frontend · typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (vue-tsc) and production build
        run: npm run build

  frontend-tests:
    name: Frontend · unit tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:run

  e2e:
    name: Frontend · E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E (Vite started by Playwright, API mocked)
        run: npm run test:e2e
