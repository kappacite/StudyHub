map $http_x_forwarded_proto $pass_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Négociation de contenu pour les agents IA (Accept: text/markdown)
        if ($http_accept ~* "text/markdown") {
            rewrite ^/notes/public/(.*)$ /api/v1/notes/public/$1 last;
            rewrite ^/$ /api/v1/markdown-root last;
            rewrite ^/.*$ /api/v1/markdown-root last;
        }

        # Link header pour la découverte d'agents (RFC 8288) sur la page d'accueil
        add_header Link '</.well-known/api-catalog>; rel="api-catalog", </docs/api>; rel="service-doc", </.well-known/agent-card.json>; rel="agent-card"' always;

        try_files $uri $uri/ /index.html;

        # En-têtes CORS explicites pour autoriser les scans et requêtes cross-origin
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Signature-Agent,Signature,Signature-Input' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # En-têtes de sécurité fondamentaux
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://static.cloudflareinsights.com; worker-src 'self' blob:; frame-src 'self';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # En-têtes de contrôle des données et accès moderne
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Signature-Agent,Signature,Signature-Input';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Redirection de sitemap.xml vers le backend
    location = /sitemap.xml {
        proxy_pass http://backend:5000/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $pass_x_forwarded_proto;
    }

    # Redirection générique du répertoire de découverte d'agents .well-known vers le backend Flask
    location ~ ^/\.well-known/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $pass_x_forwarded_proto;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $pass_x_forwarded_proto;

        # En-têtes de sécurité fondamentaux pour les réponses d'API
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://static.cloudflareinsights.com; worker-src 'self' blob:; frame-src 'self';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # En-têtes de contrôle des données et accès moderne
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Route interne pour X-Accel-Redirect (streaming des PDF)
    location /internal_uploads/ {
        internal;
        alias /app/uploads/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
